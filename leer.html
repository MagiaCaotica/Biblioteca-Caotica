<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Visor de Tomos | Biblioteca Caótica Arcana</title>
    <meta name="description" content="Visor online de grimorios y textos ocultistas de la Biblioteca Caótica Arcana. Lee directamente en el navegador sin necesidad de descargar.">
    <meta name="robots" content="noindex, follow">
    <meta name="theme-color" content="#121212">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Visor de Tomos | Biblioteca Caótica Arcana">
    <meta property="og:description" content="Lee grimorios y textos ocultistas directamente en tu navegador.">
    <meta property="og:site_name" content="Biblioteca Caótica Arcana">

    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

    <style>
        body { overflow: hidden; }
        .visor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
            padding: 0.6rem 1rem;
            background: var(--color-superficie, #1e1e1e);
            border-bottom: 1px solid var(--color-borde, #444);
        }
        .visor-header h1 {
            font-family: var(--fuente-titulos, 'Cinzel', serif);
            color: var(--color-primario, #d4af37);
            font-size: 1rem;
            margin: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .visor-controls {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .visor-btn {
            background: var(--color-superficie, #1e1e1e);
            color: var(--color-texto-principal, #e0e0e0);
            border: 1px solid var(--color-borde, #444);
            padding: 0.4rem 0.9rem;
            border-radius: 4px;
            cursor: pointer;
            font-family: var(--fuente-cuerpo, 'Lora', serif);
            font-size: 0.85rem;
            transition: all 0.2s ease;
            text-decoration: none;
        }
        .visor-btn:hover {
            border-color: var(--color-primario, #d4af37);
            color: var(--color-primario, #d4af37);
        }
        .visor-btn.active {
            background: var(--color-primario, #d4af37);
            color: var(--color-fondo, #121212);
            border-color: var(--color-primario, #d4af37);
        }
        .visor-btn:focus-visible {
            outline: 3px solid #fff;
            outline-offset: 2px;
        }
        #visor-container {
            width: 100%;
            height: calc(100vh - 60px);
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0a0a;
        }
        #pdf-canvas {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }
        #pdf-loading,
        #pdf-error {
            color: var(--color-texto-secundario, #b0b0b0);
            text-align: center;
            padding: 2rem;
        }
        #pdf-error {
            color: #ff6b6b;
        }
        .page-info {
            color: var(--color-texto-secundario, #b0b0b0);
            font-size: 0.8rem;
            margin: 0 0.5rem;
        }
        @media (max-width: 600px) {
            .visor-header { flex-direction: column; text-align: center; }
            .visor-header h1 { max-width: 100%; }
            #visor-container { height: calc(100vh - 90px); }
        }
    </style>
</head>
<body>
    <a href="#visor-container" class="skip-link">Saltar al visor</a>

    <header class="visor-header" role="banner">
        <h1 id="doc-title">Cargando tomo...</h1>
        <nav class="visor-controls" aria-label="Controles del visor PDF">
            <button id="btn-prev" class="visor-btn" aria-label="Página anterior" disabled>◀ Anterior</button>
            <span id="page-indicator" class="page-info" aria-live="polite">Pág -- / --</span>
            <button id="btn-next" class="visor-btn" aria-label="Página siguiente" disabled>▶ Siguiente</button>
            <input type="number" id="page-input" class="visor-btn" style="width:60px;text-align:center;" aria-label="Ir a página" placeholder="Pág" min="1" step="1">
            <button id="btn-go" class="visor-btn" aria-label="Ir a la página especificada">Ir</button>
            <a href="index.html" class="visor-btn" aria-label="Volver a la biblioteca">🏠 Biblioteca</a>
        </nav>
    </header>

    <main id="visor-container" role="main" aria-label="Visor de documento">
        <div id="pdf-loading" role="status">
            <div class="loading-spinner" aria-hidden="true"></div>
            Invocando el tomo desde el Akasha...
        </div>
        <canvas id="pdf-canvas" style="display:none;" aria-label="Página del documento PDF"></canvas>
        <div id="pdf-error" style="display:none;" role="alert"></div>
    </main>

    <!-- PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.7.76/pdf.min.mjs" type="module"></script>

    <script type="module">
        import * as pdfjsLib from 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.7.76/pdf.min.mjs';

        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.7.76/pdf.worker.min.mjs';

        const canvas = document.getElementById('pdf-canvas');
        const ctx = canvas.getContext('2d');
        const loadingEl = document.getElementById('pdf-loading');
        const errorEl = document.getElementById('pdf-error');
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');
        const pageIndicator = document.getElementById('page-indicator');
        const pageInput = document.getElementById('page-input');
        const btnGo = document.getElementById('btn-go');
        const docTitle = document.getElementById('doc-title');

        let pdfDoc = null;
        let currentPage = 1;
        let totalPages = 0;
        let currentScale = 1.0;

        // Get PDF URL from query parameter
        const params = new URLSearchParams(window.location.search);
        const pdfUrl = params.get('url');
        const pdfTitle = params.get('titulo') || 'Tomo Ocultista';

        docTitle.textContent = decodeURIComponent(pdfTitle);

        if (!pdfUrl) {
            showError('No se especificó ningún tomo. Añade ?url=... a la dirección. Ejemplo: ?url=https://ejemplo.com/libro.pdf&titulo=Mi Libro');
        } else {
            loadPDF(pdfUrl);
        }

        async function loadPDF(url) {
            try {
                loadingEl.style.display = 'block';
                errorEl.style.display = 'none';
                canvas.style.display = 'none';

                const loadingTask = pdfjsLib.getDocument({
                    url: url,
                    cMapUrl: 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.7.76/cmaps/',
                    cMapPacked: true
                });

                pdfDoc = await loadingTask.promise;
                totalPages = pdfDoc.numPages;
                currentPage = 1;

                loadingEl.style.display = 'none';
                canvas.style.display = 'block';

                pageInput.max = totalPages;
                pageInput.value = 1;
                updateButtons();

                await renderPage(currentPage);
            } catch (err) {
                console.error('[PDF Viewer] Error:', err);
                showError(
                    'No se pudo cargar el tomo. Posibles causas:<br><br>' +
                    '• El archivo PDF no es accesible directamente (CORS bloqueado).<br>' +
                    '• La URL no apunta a un PDF válido.<br>' +
                    '• El servidor no permite acceso externo.<br><br>' +
                    '<strong>Nota:</strong> Los archivos alojados en Mega.nz <em>no pueden</em> visualizarse directamente en el navegador ' +
                    'debido a su sistema de cifrado. Debes descargarlos primero.<br><br>' +
                    '<a href="index.html" style="color:#d4af37;">← Volver a la Biblioteca</a>'
                );
            }
        }

        async function renderPage(pageNum) {
            if (!pdfDoc) return;

            try {
                const page = await pdfDoc.getPage(pageNum);
                const viewport = page.getViewport({ scale: currentScale });

                canvas.height = viewport.height;
                canvas.width = viewport.width;
                canvas.style.display = 'block';

                const renderContext = {
                    canvasContext: ctx,
                    viewport: viewport
                };

                await page.render(renderContext).promise;
                currentPage = pageNum;
                pageIndicator.textContent = `Pág ${currentPage} / ${totalPages}`;
                pageInput.value = currentPage;
                updateButtons();
            } catch (err) {
                console.error('[PDF Viewer] Render error:', err);
            }
        }

        function updateButtons() {
            btnPrev.disabled = currentPage <= 1;
            btnNext.disabled = currentPage >= totalPages;
        }

        function showError(message) {
            loadingEl.style.display = 'none';
            canvas.style.display = 'none';
            errorEl.style.display = 'block';
            errorEl.innerHTML = message;
        }

        // ── Event Listeners ────────────────────────────────────
        btnPrev.addEventListener('click', () => {
            if (currentPage > 1) renderPage(currentPage - 1);
        });

        btnNext.addEventListener('click', () => {
            if (currentPage < totalPages) renderPage(currentPage + 1);
        });

        btnGo.addEventListener('click', () => {
            const page = parseInt(pageInput.value, 10);
            if (page >= 1 && page <= totalPages) {
                renderPage(page);
            }
        });

        pageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const page = parseInt(pageInput.value, 10);
                if (page >= 1 && page <= totalPages) {
                    renderPage(page);
                }
            }
        });

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                if (currentPage > 1) renderPage(currentPage - 1);
            } else if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                if (currentPage < totalPages) renderPage(currentPage + 1);
            } else if (e.key === 'Home') {
                e.preventDefault();
                if (currentPage > 1) renderPage(1);
            } else if (e.key === 'End') {
                e.preventDefault();
                if (currentPage < totalPages) renderPage(totalPages);
            }
        });

        // Zoom with Ctrl+Scroll
        let zoomTimeout;
        document.getElementById('visor-container').addEventListener('wheel', (e) => {
            if (e.ctrlKey) {
                e.preventDefault();
                const delta = e.deltaY > 0 ? -0.1 : 0.1;
                currentScale = Math.max(0.5, Math.min(3.0, currentScale + delta));
                clearTimeout(zoomTimeout);
                zoomTimeout = setTimeout(() => renderPage(currentPage), 100);
            }
        }, { passive: false });
    </script>
</body>
</html>
